<header class="header" [class.scrolled]="scrolled">
  <div class="header-inner">
    <a routerLink="/" class="logo">
      <span class="logo-mark">G</span>
      <span class="logo-text">Glacée</span>
    </a>

    <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Menu de navigation">
      <span class="bar" [class.open]="menuOpen"></span>
      <span class="bar" [class.open]="menuOpen"></span>
      <span class="bar" [class.open]="menuOpen"></span>
    </button>

    <nav class="nav" [class.open]="menuOpen" aria-label="Navigation principale">
      <ul class="nav-list">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="menuOpen = false">Accueil</a></li>
        <li><a routerLink="/produits" routerLinkActive="active" (click)="menuOpen = false">Nos Saveurs</a></li>
        <li><a routerLink="/a-propos" routerLinkActive="active" (click)="menuOpen = false">Notre Histoire</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="menuOpen = false">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>
